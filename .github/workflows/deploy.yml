name: Deploy gluebox-prod

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3.16.3

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Run tests
        run: nix build .#checks.x86_64-linux.nextest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/determinate-nix-action@v3.16.3

      - uses: DeterminateSystems/magic-nix-cache-action@v13

      - uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          VPS_IP=$(tailscale ip --4 gluebox-nixos)
          ssh-keyscan -H "$VPS_IP" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host gluebox-prod
            HostName $VPS_IP
            User root
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
            UserKnownHostsFile ~/.ssh/known_hosts
          EOF

      - name: Build gluebox
        run: nix build .#packages.x86_64-linux.gluebox

      - name: Copy gluebox closure to VPS
        run: |
          VPS_IP=$(tailscale ip --4 gluebox-nixos)
          NIX_SSHOPTS="-i $HOME/.ssh/deploy_key" \
            nix copy --to "ssh://root@$VPS_IP" .#packages.x86_64-linux.gluebox

      - name: Deploy with deploy-rs
        run: |
          NIX_SSHOPTS="-i $HOME/.ssh/deploy_key" \
            nix run github:serokell/deploy-rs -- \
              --ssh-opts="-i $HOME/.ssh/deploy_key" \
              --skip-checks \
              --remote-build \
              .#gluebox-prod

      - name: Render secret-backed config sections
        env:
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_IG_USER_ID: ${{ secrets.META_IG_USER_ID }}
          META_THREADS_USER_ID: ${{ secrets.META_THREADS_USER_ID }}
          META_THREADS_ACCESS_TOKEN: ${{ secrets.META_THREADS_ACCESS_TOKEN }}
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          STORJ_ACCESS_KEY: ${{ secrets.STORJ_ACCESS_KEY }}
          STORJ_SECRET_KEY: ${{ secrets.STORJ_SECRET_KEY }}
          STORJ_BUCKET: ${{ secrets.STORJ_BUCKET }}
          STONKWATCH_OPENROUTER_API_KEY: ${{ secrets.STONKWATCH_OPENROUTER_API_KEY }}
          STONKWATCH_TURSO_URL: ${{ secrets.STONKWATCH_TURSO_URL }}
          STONKWATCH_TURSO_AUTH_TOKEN: ${{ secrets.STONKWATCH_TURSO_AUTH_TOKEN }}
          STONKWATCH_API_KEY: ${{ secrets.STONKWATCH_API_KEY }}
          CHART_VIDEO_API_BASE: ${{ secrets.CHART_VIDEO_API_BASE }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_REFRESH_TOKEN: ${{ secrets.TIKTOK_REFRESH_TOKEN }}
        run: |
          umask 077
          {
            printf '\n[stonkwatch_social]\n'
            printf 'auto_post = true\n'
            printf 'openrouter_api_key = "%s"\n' "$STONKWATCH_OPENROUTER_API_KEY"
            printf 'turso_url = "%s"\n' "$STONKWATCH_TURSO_URL"
            printf 'turso_auth_token = "%s"\n' "$STONKWATCH_TURSO_AUTH_TOKEN"
            if [ -n "$STONKWATCH_API_KEY" ]; then
              printf 'stonkwatch_api_key = "%s"\n' "$STONKWATCH_API_KEY"
            fi
            if [ -n "$CHART_VIDEO_API_BASE" ]; then
              printf 'chart_video_api_base = "%s"\n' "$CHART_VIDEO_API_BASE"
            fi

            printf '\n[stonkwatch_social.meta]\n'
            printf 'page_access_token = "%s"\n' "$META_PAGE_ACCESS_TOKEN"
            printf 'page_id = "%s"\n' "$META_PAGE_ID"
            printf 'ig_user_id = "%s"\n' "$META_IG_USER_ID"
            printf 'threads_user_id = "%s"\n' "$META_THREADS_USER_ID"
            printf 'threads_access_token = "%s"\n' "$META_THREADS_ACCESS_TOKEN"

            printf '\n[stonkwatch_social.x]\n'
            printf 'client_id = "%s"\n' "$X_CLIENT_ID"
            printf 'client_secret = "%s"\n' "$X_CLIENT_SECRET"
            printf 'access_token = "%s"\n' "$X_ACCESS_TOKEN"
            printf 'refresh_token = "%s"\n' "$X_REFRESH_TOKEN"

            printf '\n[stonkwatch_social.storj]\n'
            printf 'access_key = "%s"\n' "$STORJ_ACCESS_KEY"
            printf 'secret_key = "%s"\n' "$STORJ_SECRET_KEY"
            printf 'bucket = "%s"\n' "$STORJ_BUCKET"

            if [ -n "$TIKTOK_CLIENT_KEY" ]; then
              printf '\n[stonkwatch_social.tiktok]\n'
              printf 'client_key = "%s"\n' "$TIKTOK_CLIENT_KEY"
              printf 'client_secret = "%s"\n' "$TIKTOK_CLIENT_SECRET"
              printf 'access_token = "%s"\n' "$TIKTOK_ACCESS_TOKEN"
              printf 'refresh_token = "%s"\n' "$TIKTOK_REFRESH_TOKEN"
            else
              echo "::notice::TIKTOK_CLIENT_KEY not set — skipping [stonkwatch_social.tiktok] block (TikTok + chart-video generation will not run in prod)" >&2
            fi
          } > /tmp/gluebox-secrets.toml

          scp -i ~/.ssh/deploy_key /tmp/gluebox-secrets.toml gluebox-prod:/tmp/gluebox-secrets.toml

          ssh gluebox-prod bash -se <<'REMOTE'
          set -euo pipefail
          awk '
            BEGIN { skip = 0 }
            /^[[:space:]]*\[/ {
              if ($0 ~ /^[[:space:]]*\[stonkwatch_social(\.meta|\.x|\.storj|\.tiktok)?\][[:space:]]*$/) { skip = 1; next }
              else { skip = 0 }
            }
            !skip { print }
          ' /etc/gluebox/gluebox.toml > /tmp/gluebox.toml.stripped

          cat /tmp/gluebox.toml.stripped /tmp/gluebox-secrets.toml > /etc/gluebox/gluebox.toml
          chmod 0600 /etc/gluebox/gluebox.toml
          rm -f /tmp/gluebox.toml.stripped /tmp/gluebox-secrets.toml
          systemctl restart gluebox
          REMOTE

          rm -f /tmp/gluebox-secrets.toml

      - name: Verify gluebox is healthy
        run: |
          sleep 10
          ssh gluebox-prod 'systemctl is-active gluebox'
          ssh gluebox-prod 'journalctl -u gluebox --since "1 minute ago" --no-pager' | tail -30

  release:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: orhun/git-cliff-action@v4.7.1
        id: cliff
        with:
          config: cliff.toml
          args: --bump --unreleased --strip header
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub release
        if: steps.cliff.outputs.version != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.cliff.outputs.version }}"
          if gh release view "$VERSION" &>/dev/null; then
            echo "Release $VERSION already exists, skipping"
          else
            gh release create "$VERSION" \
              --title "$VERSION" \
              --notes-file CHANGELOG.md
          fi
