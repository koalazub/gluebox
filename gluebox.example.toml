listen_addr = "127.0.0.1:8990"

# Shared secret for /api/notify endpoint (Bearer token)
notify_secret = "your-notify-secret-here"

# Unix socket path for TUI communication.
# Defaults to "gluebox.sock" in the working directory when omitted.
# socket_path = "/run/gluebox/gluebox.sock"

[turso]
url = "libsql://your-db-name.turso.io"
auth_token = "your-turso-auth-token"
# Optional: local embedded replica for fast reads + offline resilience
# replica_path = "/var/lib/gluebox/gluebox.db"

# LIF power manager. Controls when the daemon is Active vs Resting.
# All values are optional; the defaults shown here are used when the section is omitted.
[power]
# Membrane potential must reach this value to transition to Active.
threshold = 5.0
# Amount subtracted from potential on every tick.
decay_rate = 0.5
# Seconds between decay ticks.
tick_interval_secs = 30
# Amount added to potential on each activity spike.
spike_weight = 2.0
# Minimum seconds to stay Active before returning to Resting once potential drops below threshold.
min_active_secs = 10

[linear]
api_key = "lin_api_XXXXXXXX"
webhook_secret = "your-linear-webhook-signing-secret"
team_id = "your-linear-team-id"

[anytype]
# anytype-cli (anytype-heart) exposes the HTTP REST API on port 31012
api_url = "http://127.0.0.1:31012"
api_key = "your-anytype-api-key"
space_id = "your-anytype-space-id"

[matrix]
homeserver_url = "https://matrix-client.matrix.org"
access_token = "your-matrix-access-token"
room_id = "!your-main-room-id:matrix.org"
feedback_room_id = "!your-feedback-room-id:matrix.org"
bot_username = "your-bot-username"
bot_password = "your-bot-password"

[documenso]
api_url = "https://app.documenso.com/api/v1"
api_key = "your-documenso-api-key"
webhook_secret = "your-documenso-webhook-secret"

[opencode]
api_key = "your-opencode-zen-api-key"

# Optional: GitHub integration for bidirectional issue sync with Linear.
[github]
token = "ghp_your-github-token"
repo = "your-org/your-repo"
webhook_secret = "your-github-webhook-secret"

